<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ログイン｜災害安否報告システム</title>
  <link rel="stylesheet" href="style.css">
</head>
<link rel="stylesheet" href="./css/index.css">
<body>



<div class="container">
  <h2 style="text-align:center;">災害安否報告システム</h2>

  <!-- 登入 -->
  <label>社員ID</label>
  <input type="text" placeholder="社員ID">

  <label>パスワード</label>
  <input type="password" placeholder="********">

  <!-- 角色選擇（Demo用） -->
  <label>ユーザ種別</label>
  <select id="roleSelect">
    <option value="user">一般社員</option>
    <option value="admin">管理者</option>
  </select>

  <button onclick="showMenu()">ログイン</button>

  <hr style="margin:24px 0;">

  <!-- 一般社員 -->
  <div id="userMenu" style="display:none;">
    <h3>一般社員メニュー</h3>
    <div class="menu-grid">
      <a class="menu-btn" href="http://127.0.0.1:5500/1.html">安否登録画面<br></a>
      <a class="menu-btn" href="http://127.0.0.1:5500/2.html">社員安否一覧画面<br></a>
      <a class="menu-btn" href="http://127.0.0.1:5500/3.html">安否詳細画面<br></a>
    </div>
  </div>

  <!-- 管理者 -->
  <div id="adminMenu" style="display:none;">
    <h3>管理者メニュー</h3>
    <div class="menu-grid">
      <a class="menu-btn" href="safety_register.html">安否登録画面<br></a>
      <a class="menu-btn" href="safety_list.html">社員安否一覧画面<br></a>
      <a class="menu-btn" href="safety_detail.html">安否詳細画面<br></a>
      <a class="menu-btn" href="admin_menu.html">管理者用メニュー画面<br></a>
      <a class="menu-btn" href="employee_list.html">社員一覧画面<br></a>
      <a class="menu-btn" href="employee_detail.html">社員詳細画面<br></a>
      <a class="menu-btn" href="safety_delete.html">安否情報削除画面<br></a>
    </div>
  </div>
</div>

<script>
function showMenu() {
  const role = document.getElementById("roleSelect").value;
  document.getElementById("userMenu").style.display =
    role === "user" ? "block" : "none";
  document.getElementById("adminMenu").style.display =
    role === "admin" ? "block" : "none";
}
</script>

</body>
</html>
